<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 780" width="1120" height="780">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font-family: system-ui, Segoe UI, sans-serif; font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .stereo { font-family: Georgia, serif; font-size: 10px; font-style: italic; fill: #444; }
      .field { font-family: ui-monospace, Consolas, monospace; font-size: 9px; fill: #222; }
      .legend { font-family: system-ui, sans-serif; font-size: 10px; fill: #333; }
      .lbl { font-family: system-ui, sans-serif; font-size: 9px; fill: #1565c0; }
    ]]></style>
    <marker id="arrow-open" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#37474f"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#546e7a"/>
    </marker>
    <marker id="diamond-filled" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,5 L6,0 L12,5 L6,10 Z" fill="#37474f" stroke="#37474f" stroke-width="1"/>
    </marker>
  </defs>

  <text x="560" y="28" text-anchor="middle" class="title" font-size="15px">Busy Bee Calendar - UML class diagram</text>
  <text x="560" y="46" text-anchor="middle" class="stereo" font-size="10px">Miro-style three compartments / src/</text>

  <g id="box-ApplicationEntry" transform="translate(380,58)">
    <rect width="220" height="88" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="28" x2="220" y2="28" stroke="#7b1fa2"/>
    <line x1="0" y1="48" x2="220" y2="48" stroke="#7b1fa2"/>
    <text x="110" y="20" text-anchor="middle" class="title">ApplicationEntry</text>
    <text x="110" y="40" text-anchor="middle" class="stereo">&#171;bootstrap&#187;</text>
    <text x="8" y="62" class="field">(index.tsx)</text>
    <text x="8" y="76" class="field">+main() createRoot, render, vitals</text>
  </g>

  <g id="box-reportWebVitals" transform="translate(660,58)">
    <rect width="220" height="88" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="28" x2="220" y2="28" stroke="#7b1fa2"/>
    <line x1="0" y1="48" x2="220" y2="48" stroke="#7b1fa2"/>
    <text x="110" y="20" text-anchor="middle" class="title">reportWebVitals</text>
    <text x="110" y="40" text-anchor="middle" class="stereo">&#171;module&#187;</text>
    <text x="8" y="62" class="field">reportWebVitals.ts</text>
    <text x="8" y="76" class="field">+default(onPerfEntry)</text>
  </g>

  <g id="box-AddEvent" transform="translate(24,168)">
    <rect width="258" height="198" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="28" x2="258" y2="28" stroke="#2e7d32"/>
    <line x1="0" y1="48" x2="258" y2="48" stroke="#2e7d32"/>
    <text x="129" y="20" text-anchor="middle" class="title">AddEvent</text>
    <text x="129" y="40" text-anchor="middle" class="stereo">&#171;React FC&#187;</text>
    <text x="8" y="62" class="field">-importance: string</text>
    <text x="8" y="74" class="field">-eventType: string</text>
    <text x="8" y="86" class="field">-eventName: string</text>
    <text x="8" y="98" class="field">-eventTime: string</text>
    <text x="8" y="110" class="field">-eventLocation: string</text>
    <line x1="0" y1="118" x2="258" y2="118" stroke="#2e7d32"/>
    <text x="8" y="134" class="field">+render()</text>
    <text x="8" y="146" class="field">-handleClear()</text>
    <text x="8" y="158" class="field">-handleCreateEvent()</text>
    <text x="8" y="178" class="field" fill="#555">addEvent.tsx</text>
  </g>

  <g id="box-AddEventProps" transform="translate(24,392)">
    <rect width="258" height="102" fill="#e8f5e9" stroke="#558b2f" stroke-width="1.5" stroke-dasharray="4 2" rx="2"/>
    <line x1="0" y1="28" x2="258" y2="28" stroke="#558b2f"/>
    <line x1="0" y1="48" x2="258" y2="48" stroke="#558b2f"/>
    <text x="129" y="20" text-anchor="middle" class="title">AddEventProps</text>
    <text x="129" y="40" text-anchor="middle" class="stereo">&#171;TypeScript&#187;</text>
    <text x="8" y="62" class="field">+onBack(): void</text>
    <text x="8" y="76" class="field">+onCreateEvent(event): void</text>
    <text x="8" y="94" class="field" fill="#555">props contract</text>
  </g>

  <g id="box-App" transform="translate(312,148)">
    <rect width="336" height="308" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="2"/>
    <line x1="0" y1="28" x2="336" y2="28" stroke="#1565c0"/>
    <line x1="0" y1="48" x2="336" y2="48" stroke="#1565c0"/>
    <text x="168" y="20" text-anchor="middle" class="title">App</text>
    <text x="168" y="40" text-anchor="middle" class="stereo">&#171;React FC&#187;</text>
    <text x="8" y="62" class="field">-showAddEvent: boolean</text>
    <text x="8" y="74" class="field">-events: CalendarEvent[]</text>
    <text x="8" y="86" class="field">-expandedEventId: string | null</text>
    <text x="8" y="98" class="field">-googleError: string</text>
    <text x="8" y="110" class="field">-user: User | null</text>
    <text x="8" y="122" class="field">-isProfileMenuOpen: boolean</text>
    <text x="8" y="134" class="field">-googleButtonRef: Ref</text>
    <text x="8" y="146" class="field">-profileMenuRef: Ref</text>
    <line x1="0" y1="154" x2="336" y2="154" stroke="#1565c0"/>
    <text x="8" y="170" class="field">+render()</text>
    <text x="8" y="182" class="field">-handleCreateEvent(newEvent)</text>
    <text x="8" y="194" class="field">-handleSignOut()</text>
    <text x="8" y="206" class="field">-handleChangeAccount()</text>
    <text x="8" y="218" class="field">-toggleEventExpanded(eventId)</text>
    <text x="8" y="230" class="field">-getImportanceValue(importance)</text>
    <text x="8" y="242" class="field">-renderPriorityEvents(priorityEvents)</text>
    <text x="8" y="268" class="field" fill="#555">decodeJwt(), getGoogleClientId()</text>
    <text x="8" y="282" class="field" fill="#555">App.tsx</text>
  </g>

  <g id="box-WindowGoogle" transform="translate(684,188)">
    <rect width="232" height="118" fill="#eceff1" stroke="#455a64" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="28" x2="232" y2="28" stroke="#455a64"/>
    <line x1="0" y1="48" x2="232" y2="48" stroke="#455a64"/>
    <text x="116" y="20" text-anchor="middle" class="title">WindowGoogle</text>
    <text x="116" y="40" text-anchor="middle" class="stereo">&#171;external&#187;</text>
    <text x="8" y="62" class="field">window.google.accounts.id</text>
    <text x="8" y="76" class="field">initialize, renderButton, prompt</text>
    <text x="8" y="90" class="field">revoke, disableAutoSelect</text>
    <text x="8" y="108" class="field" fill="#555">gsi/client script</text>
  </g>

  <g id="box-CalendarEvent" transform="translate(248,508)">
    <rect width="272" height="168" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="28" x2="272" y2="28" stroke="#f9a825"/>
    <line x1="0" y1="48" x2="272" y2="48" stroke="#f9a825"/>
    <text x="136" y="20" text-anchor="middle" class="title">CalendarEvent</text>
    <text x="136" y="40" text-anchor="middle" class="stereo">&#171;domain / UI model&#187;</text>
    <text x="8" y="62" class="field">+id: string</text>
    <text x="8" y="74" class="field">+importance: string</text>
    <text x="8" y="86" class="field">+eventType: string</text>
    <text x="8" y="98" class="field">+eventName: string</text>
    <text x="8" y="110" class="field">+eventTime: string</text>
    <text x="8" y="122" class="field">+eventLocation: string</text>
    <text x="8" y="148" class="field" fill="#555">in-memory; App assigns id</text>
  </g>

  <g id="box-User" transform="translate(548,538)">
    <rect width="220" height="128" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="28" x2="220" y2="28" stroke="#f9a825"/>
    <line x1="0" y1="48" x2="220" y2="48" stroke="#f9a825"/>
    <text x="110" y="20" text-anchor="middle" class="title">User</text>
    <text x="110" y="40" text-anchor="middle" class="stereo">&#171;domain / session&#187;</text>
    <text x="8" y="62" class="field">+name: string</text>
    <text x="8" y="74" class="field">+email: string</text>
    <text x="8" y="86" class="field">+picture: string</text>
    <text x="8" y="108" class="field" fill="#555">from Google JWT</text>
  </g>

  <!-- ApplicationEntry to App: renders -->
  <path d="M490,146 L490,172 L480,172 L480,148" fill="none" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>
  <text x="498" y="166" class="lbl">renders</text>

  <!-- ApplicationEntry to reportWebVitals: calls -->
  <line x1="600" y1="102" x2="660" y2="102" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>
  <text x="612" y="96" class="lbl">calls</text>

  <!-- App composition to CalendarEvent -->
  <line x1="420" y1="456" x2="384" y2="508" stroke="#37474f" stroke-width="1.3" marker-start="url(#diamond-filled)" marker-end="url(#arrow-open)"/>
  <text x="330" y="478" class="lbl">1 to * owns in state</text>

  <!-- App to User association -->
  <line x1="620" y1="456" x2="658" y2="538" stroke="#37474f" stroke-width="1.2" marker-end="url(#arrow-open)"/>
  <text x="668" y="492" class="lbl">1 to 0..1 user</text>

  <!-- App to WindowGoogle -->
  <line x1="648" y1="260" x2="684" y2="247" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>
  <text x="652" y="236" class="lbl">Sign-In</text>

  <!-- App to AddEvent -->
  <line x1="312" y1="280" x2="282" y2="280" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>
  <text x="288" y="272" class="lbl">showAddEvent</text>

  <!-- AddEvent callbacks to App -->
  <path d="M153,168 C153,125 220,125 312,220" fill="none" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>
  <text x="188" y="138" class="lbl">onBack / onCreate</text>

  <!-- AddEvent to AddEventProps -->
  <line x1="153" y1="366" x2="153" y2="392" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>
  <text x="160" y="382" class="lbl">implements</text>

  <!-- App creates id on CalendarEvent -->
  <path d="M440,456 L400,500" fill="none" stroke="#90a4ae" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-dashed)"/>
  <text x="352" y="512" class="lbl" fill="#78909c">creates id</text>

  <g transform="translate(684,340)">
    <rect width="232" height="92" fill="#fafafa" stroke="#bdbdbd" rx="2"/>
    <text x="8" y="18" class="title" font-size="11px">Legend</text>
    <line x1="8" y1="28" x2="100" y2="28" stroke="#37474f" marker-end="url(#arrow-open)"/>
    <text x="108" y="32" class="legend">association</text>
    <line x1="8" y1="46" x2="100" y2="46" stroke="#546e7a" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>
    <text x="108" y="50" class="legend">dependency</text>
    <polygon points="8,58 14,54 20,58 14,62" fill="#37474f"/>
    <text x="28" y="62" class="legend">composition (App)</text>
    <text x="8" y="82" class="legend" fill="#666">Dashed box = type contract</text>
  </g>
</svg>
